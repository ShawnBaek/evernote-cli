    action: { add_tags: ["project-gureum-camera"] }

  - name: "Tag Frequent FlyClub notes"
    match: { notebook: "Frequent FlyClub" }
    action: { add_tags: ["project-frequent-flyclub"] }

  - name: "Tag pebble 개발 notes"
