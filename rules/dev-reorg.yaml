    action: { add_tags: ["project-blog"] }

  - name: "Tag HWS Moderator notes"
    match: { notebook: "HWS Moderator" }
    action: { add_tags: ["project-hws-moderator"] }

  - name: "Tag Hipvan notes"
    match: { notebook: "Hipvan" }
    action: { add_tags: ["project-hipvan"] }

  # LINE work projects — both project-specific tag AND a 'work' tag

  - name: "Tag Pay App Dev notes"
    match: { notebook: "Pay App Dev" }
    action: { add_tags: ["project-pay-app", "work"] }

  - name: "Tag Pay Main notes"
    match: { notebook: "Pay Main" }
    action: { add_tags: ["project-pay-main", "work"] }

  - name: "Tag E-KYC notes"
