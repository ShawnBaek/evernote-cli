# Reorganize all dev-related notebooks under a single 'Development' stack.
#
# - Pure framework/topic notebooks → consolidate into 6 framework notebooks
#   (iOS, Android, Server-Side, Web, Algorithms-Interview, Research-CV)
# - Project notebooks → tagged with project-<slug> but NOT moved (their
#   notes span multiple frameworks; tagging preserves the project axis).
# - Newly-created notebooks land under the 'Development' stack.

defaults:
  into_stack: Development

rules:

  # === Project tag rules run FIRST so they win over framework rules below. ===
  # Most project notebooks aren't in the framework lists, but a few overlap
  # (e.g. Frequent FlyClub is in iOS Development stack); tagging without
  # moving preserves their current notebook.

  - name: "Tag craket notes"
    match: { notebook: "craket" }
    action: { add_tags: ["project-craket"] }

  - name: "Tag Travel Crumbs notes"
    match: { notebook: "Travel Crumbs" }
    action: { add_tags: ["project-travel-crumbs"] }

  - name: "Tag ShawnLibraries notes"
    match: { notebook: "ShawnLibraries" }
    action: { add_tags: ["project-shawn-libraries"] }

  - name: "Tag 구름 카메라 notes"
